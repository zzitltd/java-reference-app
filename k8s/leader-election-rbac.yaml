# The RBAC reference-app's leader election needs — documentation of the expected
# permissions, deployed WITH the app (e.g. from its chart), not by the app itself.
# The Lease lock needs get/create/update on coordination.k8s.io leases; the resourceNames
# restriction pins it to the one Lease the app actually uses. (create cannot be
# name-restricted in RBAC, hence the second rule.)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: reference-app-leader-election
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    resourceNames: ["reference-app-leader"]
    verbs: ["get", "update"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: reference-app-leader-election
subjects:
  - kind: ServiceAccount
    name: reference-app
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: reference-app-leader-election
